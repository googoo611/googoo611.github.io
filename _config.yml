###########################################################
# Portfolio Configuration
###########################################################

title: 포트폴리오 홈
author: 홍성수
description: 기계설계 · 사출금형설계 · 생산기술 포트폴리오

url: "https://googoo611.github.io"
baseurl: ""

timezone: Asia/Seoul

###########################################################
# Navigation
###########################################################

navbar-links:
  Home: "/"
  Resume: "/career"
  Projects: "/projects"
  Portfolio (PDF): "/assets/pdf/resume.pdf"
  Contact: "/contact"

###########################################################
# Social
###########################################################

social-network-links:
  email: "googoo611@naver.com"
  github: "https://github.com/googoo611"

###########################################################
# Appearance
###########################################################

round-avatar: true

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"

navbar-col: "#F8F8F8"
navbar-text-col: "#404040"
navbar-border-col: "#E7E7E7"

footer-col: "#F8F8F8"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

title-on-all-pages: true
navbar-var-length: false

###########################################################
# Markdown
###########################################################

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

###########################################################
# Jekyll
###########################################################

permalink: /:title/

defaults:
  - scope:
      path: ""
    values:
      layout: page

###########################################################
# Plugins
###########################################################

plugins:
  - jekyll-sitemap

###########################################################
# Exclude
###########################################################

exclude:
  - README.md
  - LICENSE
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - screenshot.png
  - docs