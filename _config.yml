###########################################################
# Portfolio Configuration
###########################################################

# Site
title: 홍성수 포트폴리오
author: 홍성수
description: 기계설계 · 사출금형설계 · 생산기술 포트폴리오

url: "https://googoo611.github.io"
baseurl: ""

timezone: Asia/Seoul

###########################################################
# Navigation
###########################################################

navbar-links:
  소개: ""
  이력서: "resume"
  경력: "career"
  프로젝트: "projects"
  기술: "skills"
  연락처: "contact"

###########################################################
# Social
###########################################################

social-network-links:
  email: "googoo611@naver.com"
  github: "googoo611"

###########################################################
# Appearance
###########################################################

round-avatar: true

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"

navbar-col: "#F8F8F8"
navbar-text-col: "#404040"
navbar-border-col: "#E7E7E7"

footer-col: "#F8F8F8"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

title-on-all-pages: true
navbar-var-length: false

###########################################################
# Markdown
###########################################################

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

###########################################################
# Jekyll
###########################################################

permalink: /:title/

paginate: 5

defaults:
  -
    scope:
      path: ""
    values:
      layout: page

###########################################################
# Plugins
###########################################################

plugins:
  - jekyll-paginate
  - jekyll-sitemap

###########################################################
# Exclude
###########################################################

exclude:
  - README.md
  - LICENSE
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - screenshot.png
  - docs